name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    name: Backend CI (Java 21 & Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Start Database & Message Broker (Docker Compose)
        run: docker compose -f docker-compose.yml up -d postgres redis kafka

      - name: Run Spring Boot Tests (Unit, API, BDD)
        run: mvn clean test
        working-directory: ./todo-backend

  frontend-test:
    name: Frontend CI (Angular 20 & Cypress)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./todo-frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci
        working-directory: ./todo-frontend

      - name: Run Karma Tests (Unit)
        run: npm run test -- --watch=false --browsers=ChromeHeadless
        working-directory: ./todo-frontend

      - name: Run Cypress Tests (E2E)
        run: npm run e2e -- --watch=false --headless
        working-directory: ./todo-frontend

      - name: Build Angular Application
        run: npm run build
        working-directory: ./todo-frontend

  docker-publish-and-deploy:
    name: Build Docker Images & Deploy to Render
    # Uniquement lancé sur les Push vers la branche principale si les tests ont réussi
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase Repository Name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./todo-backend
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/todo-backend:latest
          
      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./todo-frontend
          push: true
          tags: ghcr.io/${{ env.REPO_LC }}/todo-frontend:latest
          
      - name: Trigger Render Deploy Hook
        # Déclenche les webhooks Render paramétrés dans les variables secrètes du dossier GitHub (Optionnel)
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}" ]; then
            echo "Triggering Backend Render Deployment..."
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}"
          fi
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}" ]; then
            echo "Triggering Frontend Render Deployment..."
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}"
          fi
