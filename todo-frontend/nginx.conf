# nginx.conf
# Configuration Nginx pour une SPA Angular avec HTML5 routing.
#
# Problème sans cette config :
#   Si l'utilisateur accède directement à /tasks ou /login,
#   Nginx cherche un fichier "tasks" ou "login" qui n'existe pas → 404.
#
# Solution — try_files :
#   Nginx essaie d'abord de trouver un fichier correspondant à l'URI,
#   puis le dossier, et en dernier recours sert index.html.
#   Angular Router prend ensuite le relais pour l'affichage correct.

server {
  listen 80;
  server_name localhost;

  # Racine des fichiers statiques Angular
  root /usr/share/nginx/html;
  index index.html;

  # Règle principale : SPA fallback vers index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache long pour les assets versionnés (JS, CSS, images)
  # Angular génère des noms de fichiers avec hash (ex: main.abc123.js)
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
